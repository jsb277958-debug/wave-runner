<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wave Runner</title>
<style>
html,body{margin:0;overflow:hidden;background:#03060d;color:#fff;font-family:'Segoe UI',Arial,sans-serif;user-select:none}
canvas{display:block}

/* ══ CRT SCREEN OVERLAYS ══ */
#vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8;
  background: radial-gradient(circle, transparent 40%, rgba(3, 5, 10, 0.85) 100%);
  box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
}
#scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.22) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 6px 100%;
  opacity: 0.85;
}

#hud{position:fixed;top:15px;left:15px;z-index:15;font-weight:bold;font-size:16px;letter-spacing:1px;text-shadow:0 0 8px rgba(0,223,255,0.6);background:rgba(5,10,20,0.75);padding:10px 18px;border-radius:6px;border:1px solid rgba(0,223,255,0.25);backdrop-filter:blur(5px)}

/* ══ SMOOTH TRANSITIONS FOR SCREENS ══ */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(3, 6, 13, 0.96);
  z-index:10;
  backdrop-filter:blur(8px);
  transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.3s;
  opacity: 1;
  transform: scale(1);
  visibility: visible;
}
.screen.hidden {
  opacity: 0 !important;
  transform: scale(0.96) !important;
  visibility: hidden !important;
}

/* Fallback hiding rule for standard elements */
.hidden:not(.screen):not(#dailyModal) {
  display: none !important;
}

h1,h2{letter-spacing:4px;margin-bottom:20px;text-shadow:0 0 20px var(--accent,#00dfff);color:#fff;text-align:center}
h1{font-size:46px}
button{padding:12px 28px;margin:8px;font-size:16px;font-weight:bold;background:#0d1a30;color:#fff;border:2px solid #00dfff;border-radius:4px;cursor:pointer;box-shadow:0 0 10px rgba(0,223,255,0.15);transition:all 0.2s cubic-bezier(0.16, 1, 0.3, 1);letter-spacing:1px}
button:hover{background:#00dfff;color:#03060d;box-shadow:0 0 25px rgba(0,223,255,0.75);transform:scale(1.05) translateY(-1px)}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;box-shadow:none!important;background:#0d1a30;color:#5a6e8b;border-color:#162a4a}
.btn-alt{border-color:#ff2a6d;box-shadow:0 0 10px rgba(255,42,109,0.15)}
.btn-alt:hover{background:#ff2a6d;color:#03060d;box-shadow:0 0 25px rgba(255,42,109,0.75)}
.panel-content{width:90%;max-width:700px;background:#070f1a;border:2px solid #162a4a;border-radius:8px;padding:20px;margin-bottom:15px;max-height:62vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.9)}
.panel-content::-webkit-scrollbar{width:8px}
.panel-content::-webkit-scrollbar-track{background:#03060d;border-radius:5px}
.panel-content::-webkit-scrollbar-thumb{background:#162a4a;border-radius:5px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px}
.shop-item{background:#0d1a30;border:2px solid;padding:15px 10px;border-radius:8px;text-align:center;cursor:pointer;transition:0.25s;position:relative;display:flex;flex-direction:column;justify-content:space-between;height:140px}
.shop-item:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.shop-item.equipped{background:rgba(0,223,255,0.08);border-color:#00dfff}
.rarity-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:bold;padding:2px 8px;border-radius:10px;letter-spacing:1px;text-transform:uppercase;background:#03060d;border:1px solid}
.skin-preview{width:50px;height:24px;margin:15px auto;border-radius:4px}
.stat-row{display:flex;justify-content:space-between;margin:8px 0;border-bottom:1px solid #162a4a;padding-bottom:4px}
.stat-val{font-weight:bold;color:#00dfff}
#progressBarContainer{position:fixed;top:0;left:0;width:100%;height:6px;background:rgba(255,255,255,0.05);z-index:16}
#progressBar{width:0%;height:100%;background:linear-gradient(90deg,#00dfff,#ff2a6d);transition:width 0.1s}

/* Achievement popup */
#achPopupContainer{position:fixed;top:70px;right:20px;z-index:50;display:flex;flex-direction:column;gap:10px;pointer-events:none;align-items:flex-end}
.ach-popup{background:#071424;border:2px solid #ffd700;border-radius:8px;padding:12px 16px;min-width:260px;max-width:320px;display:flex;align-items:center;gap:12px;pointer-events:none;box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);animation:achSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1),achFadeOut 0.5s ease 3.5s forwards}
.ach-popup .ach-icon{font-size:26px;flex-shrink:0;animation:achSpin 0.6s ease}
.ach-popup .ach-body .ach-label{font-size:10px;letter-spacing:2px;color:#ffd700;font-weight:bold;text-transform:uppercase}
.ach-popup .ach-body .ach-name{font-size:14px;font-weight:bold;color:#fff;margin:2px 0}
.ach-popup .ach-body .ach-bonus{font-size:12px;color:#05ffa1}
.ach-popup.epic{border-color:#bc34fa;box-shadow: 0 0 20px rgba(188, 52, 250, 0.3)}
.ach-popup.epic .ach-label{color:#bc34fa}
.ach-popup.legendary{border-color:#ff2a6d;box-shadow: 0 0 20px rgba(255, 42, 109, 0.3)}
.ach-popup.legendary .ach-label{color:#ff2a6d}
@keyframes achSlideIn{from{opacity:0;transform:translateX(80px) scale(0.85)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes achFadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.9) translateX(40px)}}
@keyframes achSpin{0%{transform:rotate(-30deg) scale(0.5)}60%{transform:rotate(15deg) scale(1.2)}100%{transform:rotate(0deg) scale(1)}}
@keyframes achShimmer{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.3)}50%{box-shadow:0 0 20px rgba(255,215,0,0.8)}}

/* Achievement screen */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.ach-card{background:#071424;border:1.5px solid;border-radius:8px;padding:12px;position:relative;transition:0.25s}
.ach-card.locked{opacity:0.4;filter:grayscale(0.8)}
.ach-card.unlocked{animation:achShimmer 3s ease-in-out infinite}
.ach-cat{font-size:9px;letter-spacing:2px;font-weight:bold;text-transform:uppercase;margin-bottom:4px;opacity:0.8}
.ach-card-name{font-size:13px;font-weight:bold;color:#fff;margin:0 0 4px}
.ach-card-desc{font-size:11px;color:#7a9ab8;line-height:1.4}
.ach-card-bonus{font-size:11px;color:#05ffa1;margin-top:6px;font-weight:bold}
.ach-check{position:absolute;top:8px;right:8px;font-size:18px}
.progress-bar-wrap{background:#03060d;border-radius:4px;height:6px;margin:12px 0 6px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00dfff,#bc34fa);transition:width 0.6s ease}

/* Audio panel */
#audioPanel{position:fixed;bottom:15px;right:15px;z-index:20;background:rgba(3,6,13,0.92);border:1px solid #162a4a;border-radius:8px;padding:12px 16px;min-width:220px;font-size:13px;transition:all 0.25s;backdrop-filter:blur(8px)}
#audioPanel.collapsed #audioPanelBody{display:none}
#audioPanelHeader{display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
#audioPanelTitle{font-weight:bold;letter-spacing:1px;color:#00dfff;font-size:13px}
#muteBtn{background:none;border:1px solid #162a4a;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;transition:all 0.2s;margin:0}
#muteBtn:hover{border-color:#00dfff;background:rgba(0,223,255,0.1);transform:none;box-shadow:none}
#muteBtn.muted{border-color:#ff2a6d;color:#ff2a6d}
.vol-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.vol-label{width:68px;font-size:12px;color:#7a9ab8;letter-spacing:0.5px;flex-shrink:0}
.vol-slider{flex:1;accent-color:#00dfff;cursor:pointer;height:4px}
.vol-value{width:30px;text-align:right;font-size:12px;color:#00dfff;font-weight:bold}
#collapseBtn{background:none;border:none;color:#7a9ab8;cursor:pointer;font-size:16px;padding:0 4px;line-height:1;margin:0}
#collapseBtn:hover{color:#00dfff;background:none;transform:none;box-shadow:none}
.audio-divider{border:none;border-top:1px solid #162a4a;margin:10px 0 4px}
#dailyBadgeBtn{display:none;margin-top:10px;width:100%;padding:7px;font-size:12px;letter-spacing:1px;background:linear-gradient(90deg,#162a4a,#0d1a30);border:1px solid #efff05;color:#efff05;border-radius:4px;cursor:pointer;transition:all 0.2s}
#dailyBadgeBtn:hover{background:#efff05;color:#03060d;transform:scale(1.03);box-shadow:0 0 12px rgba(239,255,5,0.5)}

/* Toast */
#toastContainer{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:rgba(3,6,13,0.95);border:1px solid #162a4a;border-radius:6px;padding:10px 22px;font-size:14px;font-weight:bold;letter-spacing:1px;color:#fff;animation:toastIn 0.3s ease,toastOut 0.4s ease 1.8s forwards;pointer-events:none;text-align:center}
.toast.gold{border-color:#efff05;color:#efff05;box-shadow:0 0 12px rgba(239,255,5,0.35)}
.toast.cyan{border-color:#00dfff;color:#00dfff;box-shadow:0 0 12px rgba(0,223,255,0.35)}
.toast.pink{border-color:#ff2a6d;color:#ff2a6d;box-shadow:0 0 12px rgba(255,42,109,0.35)}
.toast.purple{border-color:#bc34fa;color:#bc34fa;box-shadow:0 0 12px rgba(188,52,250,0.35)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* ══ RARE EVENT BANNER ══ */
#rareEventBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.re-announce{padding:14px 36px;border-radius:10px;font-size:26px;font-weight:bold;letter-spacing:4px;text-align:center;white-space:nowrap;border:2px solid;animation:reIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards,reOut 0.4s ease 2.4s forwards;opacity:0}
.re-sub{font-size:13px;letter-spacing:3px;text-align:center;opacity:0;animation:reIn 0.5s 0.15s cubic-bezier(0.34,1.56,0.64,1) forwards,reOut 0.4s ease 2.4s forwards;color:#fff;text-shadow:0 0 10px currentColor}
@keyframes reIn{from{opacity:0;transform:scale(0.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes reOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.9) translateY(-10px)}}

/* ══ ACTIVE EVENT HUD ══ */
#activeEventHud{position:fixed;top:65px;left:15px;z-index:15;font-size:12px;font-weight:bold;letter-spacing:1px;padding:6px 12px;border-radius:6px;border:1px solid;background:rgba(3,6,13,0.85);backdrop-filter:blur(5px);display:none;align-items:center;gap:8px}
#activeEventHud .ev-icon{font-size:16px}
#activeEventHud .ev-bar-wrap{width:80px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
#activeEventHud .ev-bar{height:100%;border-radius:3px;transition:width 0.1s}

/* ══ CANVAS OVERLAYS ══ */
#eventOverlay{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity 0.5s}
#eventVignette{position:fixed;inset:0;pointer-events:none;z-index:4;border-radius:0}

/* ══════════════ DAILY REWARD MODAL ══════════════ */
#dailyModal{
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(3,6,13,0.94);
  backdrop-filter:blur(8px);
  transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.3s;
  opacity: 1;
  visibility: visible;
}
#dailyModal.hidden {
  opacity: 0 !important;
  visibility: hidden !important;
}

.daily-modal-box{
  width:min(96vw,540px);
  background:linear-gradient(160deg,#071528 0%,#030914 100%);
  border:2px solid #ffd700;
  border-radius:16px;
  padding:32px 28px 28px;
  position:relative;
  box-shadow:0 0 60px rgba(255,215,0,0.18),0 0 120px rgba(0,0,0,0.9);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  transform: scale(1);
}
#dailyModal.hidden .daily-modal-box {
  transform: scale(0.88) !important;
}

.daily-title{font-size:22px;font-weight:bold;letter-spacing:4px;text-align:center;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.6);margin-bottom:4px}
.daily-subtitle{font-size:12px;letter-spacing:2px;text-align:center;color:#7a9ab8;margin-bottom:20px}
/* Streak bar */
.streak-row{display:flex;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.streak-day{width:54px;height:68px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:bold;letter-spacing:1px;border:1.5px solid #162a4a;background:#05101e;position:relative;transition:all 0.3s;color:#7a9ab8;cursor:default}
.streak-day.claimed{background:linear-gradient(160deg,#0f2e18,#0a1f10);border-color:#05ffa1;color:#05ffa1}
.streak-day.claimed .day-icon{filter:none}
.streak-day.active{border-color:#ffd700;background:linear-gradient(160deg,#241d02,#171201);color:#ffd700;box-shadow:0 0 18px rgba(255,215,0,0.35);animation:activePulse 1.6s ease-in-out infinite}
.streak-day.missed{border-color:#ff2a6d44;background:#05101e;opacity:0.45;color:#ff2a6d}
.streak-day.milestone{border-color:#bc34fa;background:linear-gradient(160deg,#150721,#0e0417)}
.streak-day.milestone.active{border-color:#ff2a6d;box-shadow:0 0 22px rgba(255,42,109,0.45);animation:activePulse 1.2s ease-in-out infinite}
.streak-day.future{opacity:0.35}
@keyframes activePulse{0%,100%{box-shadow:0 0 18px rgba(255,215,0,0.35)}50%{box-shadow:0 0 32px rgba(255,215,0,0.7)}}
.day-label{font-size:9px;letter-spacing:1px;opacity:0.8;text-transform:uppercase}
.day-icon{font-size:22px;line-height:1}
.day-coins{font-size:11px;font-weight:bold}
.day-check{position:absolute;top:4px;right:5px;font-size:12px}
/* Milestone star */
.milestone-star{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:14px;animation:starFloat 1.5s ease-in-out infinite}
@keyframes starFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
/* Reward display */
.reward-display{text-align:center;margin:16px 0 20px;padding:18px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.18);border-radius:10px}
.reward-amount{font-size:44px;font-weight:bold;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.8);letter-spacing:2px;line-height:1}
.reward-label{font-size:11px;letter-spacing:3px;color:#7a9ab8;margin-top:4px;text-transform:uppercase}
.streak-bonus-note{font-size:12px;color:#05ffa1;margin-top:6px;font-weight:bold}
/* Streak info */
.streak-info-row{display:flex;justify-content:space-around;margin-bottom:18px;text-align:center}
.streak-info-item{display:flex;flex-direction:column;gap:3px}
.streak-info-val{font-size:22px;font-weight:bold;color:#00dfff}
.streak-info-lbl{font-size:10px;letter-spacing:1.5px;color:#7a9ab8;text-transform:uppercase}
/* Claim button */
.claim-btn{width:100%;padding:14px;font-size:16px;font-weight:bold;letter-spacing:3px;background:linear-gradient(135deg,#132402,#0b1501);border:2px solid #efff05;color:#efff05;border-radius:8px;cursor:pointer;transition:all 0.25s;text-transform:uppercase;box-shadow:0 0 20px rgba(239,255,5,0.15);margin-bottom:10px}
.claim-btn:hover:not(:disabled){background:linear-gradient(135deg,#efff05,#c8d800);color:#03060d;box-shadow:0 0 35px rgba(239,255,5,0.55);transform:scale(1.02)}
.claim-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.close-btn{width:100%;padding:10px;font-size:13px;font-weight:bold;letter-spacing:2px;background:transparent;border:1px solid #162a4a;color:#7a9ab8;border-radius:6px;cursor:pointer;transition:all 0.2s}
.close-btn:hover{border-color:#00dfff;color:#00dfff;background:rgba(0,223,255,0.05);transform:none;box-shadow:none}
/* Countdown */
.countdown-wrap{text-align:center;margin-bottom:14px}
.countdown-label{font-size:10px;letter-spacing:2px;color:#7a9ab8;text-transform:uppercase;margin-bottom:3px}
.countdown-val{font-size:18px;font-weight:bold;color:#00dfff;letter-spacing:2px;font-variant-numeric:tabular-nums}
/* Claimed animation overlay */
#claimOverlay{position:fixed;inset:0;z-index:200;pointer-events:none;display:flex;align-items:center;justify-content:center}
#claimOverlay.hidden{display:none}
.claim-burst{font-size:80px;animation:burstAnim 0.8s cubic-bezier(0.22,1.2,0.36,1) forwards}
@keyframes burstAnim{0%{opacity:0;transform:scale(0.3) rotate(-20deg)}50%{opacity:1;transform:scale(1.3) rotate(5deg)}80%{opacity:1;transform:scale(1) rotate(0)}100%{opacity:0;transform:scale(1.1) rotate(0)}}
.coin-particle{position:absolute;font-size:22px;animation:coinFly var(--dur,0.9s) ease-out forwards;opacity:0}
@keyframes coinFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.4) rotate(var(--rot))}}

/* Streak milestone popup */
.milestone-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;background:linear-gradient(160deg,#150724,#0e0417);border:2px solid #bc34fa;border-radius:14px;padding:24px 32px;text-align:center;animation:milestoneAnim 0.5s cubic-bezier(0.34,1.56,0.64,1),milestoneFade 0.4s ease 3s forwards;pointer-events:none;min-width:280px;box-shadow:0 0 60px rgba(188,52,250,0.4)}
@keyframes milestoneAnim{from{opacity:0;transform:translate(-50%,-50%) scale(0.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes milestoneFade{from{opacity:1}to{opacity:0}}
.milestone-popup-title{font-size:14px;letter-spacing:3px;color:#bc34fa;font-weight:bold;text-transform:uppercase}
.milestone-popup-name{font-size:28px;font-weight:bold;color:#fff;margin:6px 0}
.milestone-popup-bonus{font-size:16px;color:#ffd700}

/* Daily button on menu */
#menuDailyBtn{position:relative;overflow:visible}
.daily-badge{position:absolute;top:-8px;right:-8px;background:#ff2a6d;color:#fff;font-size:10px;font-weight:bold;padding:2px 6px;border-radius:10px;letter-spacing:0.5px;animation:badgePulse 1s ease-in-out infinite}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
</head>
<body>
<div id="vignette"></div>
<div id="scanlines"></div>

<canvas id="game"></canvas>
<div id="progressBarContainer"><div id="progressBar"></div></div>
<div id="hud">Score: <span id="score">0</span> | Coins: <span id="coins">0</span> | Best: <span id="best">0</span></div>
<div id="achPopupContainer"></div>
<div id="toastContainer"></div>
<div id="claimOverlay" class="hidden"></div>
<div id="eventOverlay"></div>
<div id="eventVignette"></div>
<div id="rareEventBanner"></div>
<div id="activeEventHud"><span class="ev-icon"></span><span class="ev-name"></span><div class="ev-bar-wrap"><div class="ev-bar"></div></div></div>

<!-- ══════════════ DAILY REWARD MODAL ══════════════ -->
<div id="dailyModal" class="hidden">
  <div class="daily-modal-box">
    <div class="daily-title">★ DAILY REWARD ★</div>
    <div class="daily-subtitle" id="dailySubtitle">LOGIN STREAK</div>
    <div class="streak-row" id="streakRow"></div>
    <div class="streak-info-row">
      <div class="streak-info-item"><div class="streak-info-val" id="streakInfoCurrent">0</div><div class="streak-info-lbl">Current Streak</div></div>
      <div class="streak-info-item"><div class="streak-info-val" id="streakInfoBest">0</div><div class="streak-info-lbl">Best Streak</div></div>
      <div class="streak-info-item"><div class="streak-info-val" id="streakInfoTotal">0</div><div class="streak-info-lbl">Days Claimed</div></div>
    </div>
    <div class="reward-display" id="rewardDisplay">
      <div class="reward-amount" id="rewardAmount">100</div>
      <div class="reward-label">COINS</div>
      <div class="streak-bonus-note" id="streakBonusNote"></div>
    </div>
    <div class="countdown-wrap" id="countdownWrap" style="display:none">
      <div class="countdown-label">Next reward available in</div>
      <div class="countdown-val" id="countdownVal">23:59:59</div>
    </div>
    <button class="claim-btn" id="claimBtn">CLAIM REWARD</button>

<script>
/* ══════════════ AUDIO ENGINE ══════════════ */
const Audio = (() => {
  let ctx=null,masterGain,sfxGain,uiGain,rewardGain;
  const STORE_KEY='waveRunnerAudio_v1';
  let settings={master:0.80,sfx:0.90,ui:0.70,reward:1.00,muted:false};
  try{const s=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');settings={...settings,...s};}catch(e){}
  function saveSettings(){try{localStorage.setItem(STORE_KEY,JSON.stringify(settings));}catch(e){}}
  function ensure(){
    if(ctx)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain();sfxGain=ctx.createGain();uiGain=ctx.createGain();rewardGain=ctx.createGain();
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.knee.value=10;comp.ratio.value=6;comp.attack.value=0.003;comp.release.value=0.12;
    sfxGain.connect(masterGain);uiGain.connect(masterGain);rewardGain.connect(masterGain);
    masterGain.connect(comp);comp.connect(ctx.destination);
    applyVolumes();
  }
  function applyVolumes(){
    if(!ctx)return;
    const m=settings.muted?0:settings.master;
    masterGain.gain.setTargetAtTime(m,ctx.currentTime,0.02);
    sfxGain.gain.setTargetAtTime(settings.sfx,ctx.currentTime,0.02);
    uiGain.gain.setTargetAtTime(settings.ui,ctx.currentTime,0.02);
    rewardGain.gain.setTargetAtTime(settings.reward,ctx.currentTime,0.02);
  }
  function osc(bus,{type='sine',freq=440,freqEnd=null,freqTime=0.1,vol=0.18,volEnd=0.001,duration=0.15,detune=0,attack=0.003}={}){
    if(!ctx)return;
    const now=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.detune.value=detune;o.frequency.setValueAtTime(freq,now);
    if(freqEnd!==null)o.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1),now+freqTime);
    g.gain.setValueAtTime(0.0001,now);g.gain.linearRampToValueAtTime(vol,now+attack);
    g.gain.exponentialRampToValueAtTime(Math.max(volEnd,0.0001),now+duration);
    o.connect(g);g.connect(bus);o.start(now);o.stop(now+duration+0.01);
  }
  function noise(bus,{vol=0.08,duration=0.06,type='white',attack=0.001}={}){
    if(!ctx)return;
    const now=ctx.currentTime,len=Math.ceil(ctx.sampleRate*(duration+0.05));
    const buf=ctx.createBuffer(1,len,ctx.sampleRate),data=buf.getChannelData(0);
    for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(type==='pink'?1/(1+i*0.001):1);
    const src=ctx.createBufferSource(),g=ctx.createGain(),filter=ctx.createBiquadFilter();
    filter.type=type==='pink'?'lowpass':'highpass';filter.frequency.value=type==='pink'?1200:2400;
    src.buffer=buf;g.gain.setValueAtTime(0.0001,now);g.gain.linearRampToValueAtTime(vol,now+attack);
    g.gain.exponentialRampToValueAtTime(0.0001,now+duration);
    src.connect(filter);filter.connect(g);g.connect(bus);src.start(now);src.stop(now+duration+0.05);
  }
  const SFX={
    click(){ensure();osc(sfxGain,{type:'triangle',freq:520,freqEnd:180,freqTime:0.07,vol:0.14,duration:0.09,attack:0.002});},
    death(){
      ensure();
      osc(sfxGain,{type:'sawtooth',freq:180,freqEnd:28,freqTime:0.45,vol:0.22,duration:0.5,attack:0.004});
      osc(sfxGain,{type:'square',freq:95,freqEnd:22,freqTime:0.4,vol:0.12,duration:0.45,attack:0.006,detune:700});
      noise(sfxGain,{vol:0.16,duration:0.35,type:'white',attack:0.003});
      osc(sfxGain,{type:'sine',freq:55,freqEnd:30,freqTime:0.6,vol:0.10,duration:0.65,attack:0.01});
    },
    point(){ensure();osc(sfxGain,{type:'sine',freq:680,freqEnd:840,freqTime:0.04,vol:0.06,duration:0.07,attack:0.002});},
    rareEvent(){
      ensure();
      [440,554,659,880,1109].forEach((f,i)=>{
        setTimeout(()=>{
          osc(sfxGain,{type:'sine',freq:f,freqEnd:f*1.4,freqTime:0.08,vol:0.11,duration:0.14,attack:0.003,detune:i*10});
          osc(sfxGain,{type:'triangle',freq:f*2,vol:0.05,duration:0.10,attack:0.002});
        },i*65);
      });
    }
  };
  const UI={
    nav(){ensure();osc(uiGain,{type:'triangle',freq:340,freqEnd:260,freqTime:0.06,vol:0.10,duration:0.09,attack:0.002});},
    confirm(){ensure();osc(uiGain,{type:'sine',freq:480,freqEnd:600,freqTime:0.05,vol:0.11,duration:0.12,attack:0.003});osc(uiGain,{type:'sine',freq:720,vol:0.06,duration:0.10,attack:0.005});},
    back(){ensure();osc(uiGain,{type:'triangle',freq:280,freqEnd:180,freqTime:0.08,vol:0.09,duration:0.10,attack:0.002});},
    shopOpen(){ensure();[0,60,110].forEach((delay,i)=>{setTimeout(()=>{osc(uiGain,{type:'sine',freq:[300,380,480][i],vol:0.09,duration:0.12,attack:0.004});},delay);});},
    tab(){ensure();osc(uiGain,{type:'triangle',freq:420,freqEnd:380,freqTime:0.04,vol:0.07,duration:0.06,attack:0.001});}
  };
  const Reward={
    coinEarn(amount=1){
      ensure();
      const pitch=Math.min(1400,580+amount*18);
      osc(rewardGain,{type:'sine',freq:pitch,freqEnd:pitch*1.25,freqTime:0.05,vol:0.09,duration:0.10,attack:0.002});
      if(amount>=20)setTimeout(()=>osc(rewardGain,{type:'sine',freq:pitch*1.5,vol:0.06,duration:0.08,attack:0.002}),60);
    },
    purchase(){
      ensure();
      [523,659,784,1047].forEach((f,i)=>{
        setTimeout(()=>{
          osc(rewardGain,{type:'sine',freq:f,vol:0.12,duration:0.18,attack:0.004});
          osc(rewardGain,{type:'triangle',freq:f*1.5,vol:0.05,duration:0.14,attack:0.003});
        },i*70);
      });
    },
    highScore(){
      ensure();
      [523,659,784,1047,1319,1047,1319,1568].forEach((f,i)=>{
        setTimeout(()=>{
          osc(rewardGain,{type:'sine',freq:f,vol:0.14,duration:0.16,attack:0.004});
          osc(rewardGain,{type:'triangle',freq:f*2,vol:0.04,duration:0.12,attack:0.003});
          if(i===7)noise(rewardGain,{vol:0.06,duration:0.12,type:'pink'});
        },i*80);
      });
    },
    achievement(tier='gold'){
      ensure();
      const notes=tier==='legendary'?[330,415,523,659,830,1047,1319]:[262,330,392,523,659];
      notes.forEach((f,i)=>{
        setTimeout(()=>{
          osc(rewardGain,{type:'sine',freq:f,vol:0.12,duration:0.22,attack:0.005});
          osc(rewardGain,{type:'triangle',freq:f*2,vol:0.04,duration:0.18,attack:0.006});
        },i*55);
      });
      setTimeout(()=>noise(rewardGain,{vol:0.06,duration:0.10,type:'pink'}),notes.length*55);
    },
    dailyReward(isMilestone=false){
      ensure();
      const base=isMilestone?[784,880,1047,1319,1568,1319,1568,1976]:[784,880,1047,1319,1047,880,1047,1319,1568];
      base.forEach((f,i)=>{
        setTimeout(()=>{
          osc(rewardGain,{type:'sine',freq:f,vol:0.13,duration:0.20,attack:0.004});
          osc(rewardGain,{type:'triangle',freq:f*0.5,vol:0.06,duration:0.18,attack:0.006});
          if(i%2===0)osc(rewardGain,{type:'sine',freq:f*2,vol:0.03,duration:0.10,attack:0.002});
        },i*75);
      });
      setTimeout(()=>noise(rewardGain,{vol:isMilestone?0.12:0.07,duration:0.15,type:'pink'}),base.length*75);
      if(isMilestone){
        setTimeout(()=>{
          [1319,1568,1976,2093].forEach((f,i)=>setTimeout(()=>osc(rewardGain,{type:'sine',freq:f,vol:0.10,duration:0.25,attack:0.005}),i*60));
        },700);
      }
    },
    equip(){ensure();osc(rewardGain,{type:'sine',freq:880,freqEnd:1100,freqTime:0.06,vol:0.10,duration:0.14,attack:0.003});setTimeout(()=>osc(rewardGain,{type:'triangle',freq:1320,vol:0.06,duration:0.10,attack:0.003}),70);}
  };
  return{
    SFX,UI,Reward,ensure,
    setVolume(cat,val){ensure();settings[cat]=val/100;saveSettings();applyVolumes();},
    toggleMute(){ensure();settings.muted=!settings.muted;saveSettings();applyVolumes();return settings.muted;},
    isMuted(){return settings.muted;},
    getSettings(){return{...settings};}
  };
})();

/* ══════════════ DAILY REWARD SYSTEM ══════════════ */
const DailyReward = (() => {
  const STORE_KEY = 'waveRunnerDaily_v2';
  const DAY_REWARDS = [
    {coins:100,  icon:'⚡', label:'DAY 1'},
    {coins:200,  icon:'💰', label:'DAY 2'},
    {coins:300,  icon:'🔷', label:'DAY 3'},
    {coins:400,  icon:'🚀', label:'DAY 4'},
    {coins:500,  icon:'💎', label:'DAY 5'},
    {coins:600,  icon:'🌟', label:'DAY 6'},
    {coins:1000, icon:'👑', label:'DAY 7', milestone:true, milestoneLabel:'WEEKLY BONUS'},
  ];
  const MILESTONES = [
    {at:7,   bonus:500,  name:'Week Warrior',   icon:'🏆'},
    {at:14,  bonus:1000, name:'Fortnight Legend',icon:'🌌'},
    {at:30,  bonus:2500, name:'Monthly Master',  icon:'👑'},
    {at:100, bonus:10000,name:'Centurion',        icon:'🌠'},
  ];
  function loadData(){
    try{
      const d = JSON.parse(localStorage.getItem(STORE_KEY)||'null');
      if(d) return d;
    }catch(e){}
    return {
      streak:0,
      bestStreak:0,
      totalClaimed:0,
      lastClaimTimestamp:0,
      claimHistory:[],
      milestonesClaimed:[]
    };
  }
  function saveData(d){ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
  function getMidnight(ts){
    const d = new Date(ts);
    d.setHours(0,0,0,0);
    return d.getTime();
  }
  function getStatus(){
    const d = loadData();
    const now = Date.now();
    const todayMidnight = getMidnight(now);
    const lastMidnight  = getMidnight(d.lastClaimTimestamp||0);
    const daysSinceLast = Math.floor((todayMidnight - lastMidnight) / 86400000);
    let canClaim = false;
    let streakBroken = false;
    let msUntilNext = 0;
    if(d.lastClaimTimestamp === 0){
      canClaim = true;
    } else if(daysSinceLast === 0){
      canClaim = false;
      const tomorrow = todayMidnight + 86400000;
      msUntilNext = tomorrow - now;
    } else if(daysSinceLast === 1){
      canClaim = true;
    } else {
      canClaim = true;
      streakBroken = true;
    }
    return {d, canClaim, streakBroken, msUntilNext, daysSinceLast};
  }
  function getRewardForDay(dayInCycle){
    return DAY_REWARDS[dayInCycle % 7];
  }
  function previewClaim(){
    const {d, canClaim, streakBroken} = getStatus();
    let streak = streakBroken ? 0 : d.streak;
    const dayInCycle = streak % 7;
    const reward = getRewardForDay(dayInCycle);
    const weekBonus = Math.floor(streak / 7);
    const multiplier = 1 + Math.min(weekBonus * 0.10, 1.0);
    const baseCoins = reward.coins;
    const bonusCoins = Math.round(baseCoins * (multiplier - 1));
    const totalCoins = baseCoins + bonusCoins;
    const newStreak = streak + 1;
    const milestone = MILESTONES.find(m => m.at === newStreak && !d.milestonesClaimed.includes(m.at));
    return {reward, dayInCycle, streak, newStreak, baseCoins, bonusCoins, totalCoins, multiplier, milestone, canClaim, streakBroken};
  }
  function claim(){
    const {d, canClaim, streakBroken} = getStatus();
    if(!canClaim) return null;
    const preview = previewClaim();
    const {totalCoins, milestone, newStreak} = preview;
    d.streak = streakBroken ? 1 : newStreak;
    d.bestStreak = Math.max(d.bestStreak||0, d.streak);
    d.totalClaimed = (d.totalClaimed||0) + 1;
    d.lastClaimTimestamp = Date.now();
    d.claimHistory = [...(d.claimHistory||[]), {day:d.streak, timestamp:Date.now(), coins:totalCoins}];
    if(d.claimHistory.length > 100) d.claimHistory = d.claimHistory.slice(-100);
    let milestoneBonus = 0;
    if(milestone){
      milestoneBonus = milestone.bonus;
      d.milestonesClaimed = [...(d.milestonesClaimed||[]), milestone.at];
    }
    saveData(d);
    return {totalCoins, milestone, milestoneBonus, ...preview, streak:d.streak, bestStreak:d.bestStreak};
  }
  function getData(){ return loadData(); }
  return {getStatus, previewClaim, claim, getData, DAY_REWARDS, MILESTONES, getMidnight, getRewardForDay};
})();

/* ══════════════ WORLD GEN ══════════════ */
function pointInTriangle(px,py,x1,y1,x2,y2,x3,y3){
  const d1=(px-x2)*(y1-y2)-(x1-x2)*(py-y2);
  const d2=(px-x3)*(y2-y3)-(x2-x3)*(py-y3);
  const d3=(px-x1)*(y3-y1)-(x3-x1)*(py-y1);
  return!((d1<0||d2<0||d3<0)&&(d1>0||d2>0||d3>0));
}
function pointInBox(px,py,bx,by,bw,bh){return px>=bx&&px<=bx+bw&&py>=by&&py<=by+bh;}
function pushSpike(x1,y1,x2,y2,x3,y3,isCeiling=false){worldObstacles.push({type:'triangle',x1,y1,x2,y2,x3,y3,cleared:false,isCeiling});}
function pushBlock(x,y,w,h){worldObstacles.push({type:'box',x,y,w,h,cleared:false});structuralBlocks.push({x,y,w,h});}
function pushSegTunnel(startX,length,ceilH,floorY){
  const sw=50;
  for(let x=startX;x<startX+length;x+=sw){
    const cw=Math.min(sw,(startX+length)-x);
    pushBlock(x,0,cw,ceilH);pushBlock(x,floorY,cw,WORLD_HEIGHT-floorY);
  }
}
function generateChunk(){
  const cGap=260,mid=WORLD_HEIGHT/2;
  const bCeilY=mid-cGap/2,bFloorY=mid+cGap/2;
  const cLen=1000;
  const fmts=['SCURVE','SAWTOOTH','GRAVITY_PILLARS','GRID_MATRIX','CHOKE_POINT','GAUNTLET_STEP'];
  const sel=fmts[Math.floor(Math.random()*fmts.length)];
  let lx=nextGenerationWorldX+100;
  switch(sel){
    case 'SCURVE':
      pushSegTunnel(nextGenerationWorldX,300,bCeilY,bFloorY);
      pushSegTunnel(nextGenerationWorldX+300,300,bCeilY-60,bFloorY-60);
      pushSegTunnel(nextGenerationWorldX+600,400,bCeilY+40,bFloorY+40);
      pushSpike(lx+350,bFloorY-60,lx+390,bFloorY-60,lx+370,bFloorY-82);
      pushSpike(lx+650,bCeilY+40,lx+690,bCeilY+40,lx+670,bCeilY+62,true);
      break;
    case 'SAWTOOTH':
      pushSegTunnel(nextGenerationWorldX,cLen,bCeilY,bFloorY);
      while(lx<nextGenerationWorldX+cLen-150){
        pushSpike(lx,bCeilY,lx+40,bCeilY,lx+20,bCeilY+45,true);
        pushSpike(lx+80,bFloorY,lx+120,bFloorY,lx+100,bFloorY-45);
        lx+=160;
      }
      break;
    case 'GRAVITY_PILLARS':
      pushSegTunnel(nextGenerationWorldX,cLen,bCeilY,bFloorY);
      while(lx<nextGenerationWorldX+cLen-200){
        pushBlock(lx,bCeilY,50,60);pushSpike(lx,bCeilY+60,lx+50,bCeilY+60,lx+25,bCeilY+78,true);
        pushBlock(lx,bFloorY-60,50,60);pushSpike(lx,bFloorY-60,lx+50,bFloorY-60,lx+25,bFloorY-78);
        lx+=280;
      }
      break;
    case 'GRID_MATRIX':
      pushSegTunnel(nextGenerationWorldX,cLen,bCeilY,bFloorY);
      while(lx<nextGenerationWorldX+cLen-220){
        const by2=mid-20;pushBlock(lx,by2,80,40);
        pushSpike(lx+10,by2,lx+40,by2,lx+25,by2-20);
        pushSpike(lx+40,by2+40,lx+70,by2+40,lx+55,by2+60,true);
        lx+=300;
      }
      break;
    case 'CHOKE_POINT':
      pushSegTunnel(nextGenerationWorldX,300,bCeilY,bFloorY);
      pushSegTunnel(nextGenerationWorldX+300,400,bCeilY+50,bFloorY-50);
      pushSegTunnel(nextGenerationWorldX+700,300,bCeilY,bFloorY);
      const nx=nextGenerationWorldX+450;
      pushSpike(nx-20,mid,nx+20,mid,nx,mid-20);
      pushSpike(nx-20,mid,nx+20,mid,nx,mid+20);
      break;
    case 'GAUNTLET_STEP':
      pushSegTunnel(nextGenerationWorldX,cLen,bCeilY,bFloorY);
      while(lx<nextGenerationWorldX+cLen-250){
        pushBlock(lx,bFloorY-45,90,45);pushSpike(lx+15,bFloorY-45,lx+45,bFloorY-45,lx+30,bFloorY-65);
        pushBlock(lx+120,bCeilY,90,45);pushSpike(lx+135,bCeilY+45,lx+165,bCeilY+45,lx+150,bCeilY+65,true);
        lx+=360;
      }
      break;
  }
  nextGenerationWorldX+=cLen;
}
function buildWorld(){
  worldObstacles=[];structuralBlocks=[];nextGenerationWorldX=0;
  pushSegTunnel(0,600,100,WORLD_HEIGHT-100);
  nextGenerationWorldX=600;
  for(let i=0;i<4;i++)generateChunk();
}

const RE = (() => {
  let active = null;
  let ticksLeft = 0;
  let cooldown = 0;
  let eventCoinsEarned = 0;
  const COOLDOWN_MIN = 900;
  const banner = document.getElementById('rareEventBanner');
  const hud = document.getElementById('activeEventHud');
  const overlay = document.getElementById('eventOverlay');
  const vignette = document.getElementById('eventVignette');

  function tryRoll(currentScore){
    if(active || cooldown > 0) return;
    const roll = Math.random();
    if(roll > 0.0003) return;
    const eligible = RARE_EVENTS.filter(e => currentScore >= e.min);
    if(!eligible.length) return;
    const totalW = eligible.reduce((s,e)=>s+e.w, 0);
    let r = Math.random() * totalW;
    for(const ev of eligible){ r -= ev.w; if(r<=0){ trigger(ev); return; } }
  }

  function trigger(ev){
    active = ev;
    ticksLeft = ev.dur;
    eventCoinsEarned = 0;
    showBanner(ev);
    applyVisuals(ev, true);
    Audio.SFX.rareEvent();
    cooldown = COOLDOWN_MIN + ev.dur;
    showToast(`${ev.icon} ${ev.name}`, 'purple');
    triggerFlash(ev.color, 0.45);
  }

  function showBanner(ev){
    banner.innerHTML = `
      <div class="re-announce" style="background:${ev.bg};border-color:${ev.color};color:${ev.color};text-shadow:0 0 20px ${ev.color}">${ev.icon} ${ev.name}</div>
      <div class="re-sub" style="color:${ev.color}">${ev.desc}</div>`;
    setTimeout(()=>{ banner.innerHTML=''; }, 3000);
  }

  function applyVisuals(ev, on){
    if(on){
      overlay.style.background = ev.bg;
      overlay.style.opacity = '1';
      vignette.style.boxShadow = `inset 0 0 120px 40px ${ev.color}44`;
    } else {
      overlay.style.opacity = '0';
      vignette.style.boxShadow = 'none';
    }
    hud.style.display = on ? 'flex' : 'none';
    if(on){
      hud.querySelector('.ev-icon').textContent = ev.icon;
      hud.querySelector('.ev-name').textContent = ev.name;
      hud.style.borderColor = ev.color;
      hud.style.color = ev.color;
      hud.querySelector('.ev-bar').style.background = ev.color;
    }
  }

  function updateHudBar(){
    if(!active) return;
    const pct = (ticksLeft / active.dur * 100).toFixed(1);
    hud.querySelector('.ev-bar').style.width = pct + '%';
  }

  function tick_update(currentScore){
    if(cooldown > 0) cooldown--;
    if(!active){ tryRoll(currentScore); return; }
    ticksLeft--;
    updateHudBar();
    if(ticksLeft <= 0) end();
  }

  function end(){
    if(!active) return;
    applyVisuals(active, false);
    if(eventCoinsEarned > 0){
      showToast(`${active.icon} +${eventCoinsEarned} event coins!`, 'gold');
      Audio.Reward.coinEarn(eventCoinsEarned);
    }
    active = null;
    ticksLeft = 0;
  }

  function reset(){
    active = null; ticksLeft = 0; cooldown = 300; eventCoinsEarned = 0;
    overlay.style.opacity = '0';
    vignette.style.boxShadow = 'none';
    hud.style.display = 'none';
    banner.innerHTML = '';
  }

  function onSpikeDodged(){
    if(!active) return 0;
    let bonus = 0;
    if(active.id==='coin_rush')   bonus = 5;
    if(active.id==='double_cur')  bonus = 2;
    if(active.id==='lucky_run')   bonus = 2;
    if(active.id==='crystal_cave')bonus = 1;
    if(active.id==='golden_tunnel')bonus = 3;
    if(bonus > 0){ eventCoinsEarned += bonus; }
    return bonus;
  }

  function speedMult(){ return active?.id==='hyper_speed' ? 1.7 : active?.id==='slow_mo' ? 0.5 : 1; }
  function coinMult(){ return active?.id==='double_cur' ? 2 : active?.id==='lucky_run' ? 1.5 : 1; }
  function scoreMult(){ return active?.id==='crystal_cave' ? 1.5 : active?.id==='hyper_speed' ? 1.3 : active?.id==='lucky_run' ? 1.2 : 1; }

  function get(){ return active; }
  function getTicksLeft(){ return ticksLeft; }

  return { tick_update, onSpikeDodged, speedMult, coinMult, scoreMult, reset, get, getTicksLeft, end };
})();

/* ══════════════ VISUAL JUICE UTILITIES ══════════════ */
function spawnShockwave(x, y, color='#ff2a6d', maxRadius=140, thickness=4) {
  shockwaves.push({
    x, y, radius: 10, maxRadius, color, thickness, life: 1.0, decay: 0.04
  });
}

function spawnFloatingText(x, y, text, color='#ffd700', size=16) {
  floatingTexts.push({
    x, y, text, color, size, vx: (Math.random()-0.5)*2, vy: -1.5 - Math.random()*2, life: 1.0, decay: 0.025
  });
}

function triggerFlash(color, intensity=0.4) {
  flashColor = color;
  flashIntensity = intensity;
}

function drawMountains(layerZ, color, ridgeColor, heightMult, offset) {
  ctx2.save();
  ctx2.fillStyle = color;
  ctx2.strokeStyle = ridgeColor || 'transparent';
  ctx2.lineWidth = 2;
  
  ctx2.beginPath();
  const startX = camera.x;
  const endX = camera.x + canvas.width / ZOOM_FACTOR + 100;
  ctx2.moveTo(startX, WORLD_HEIGHT + 100);

  const step = 45;
  for (let x = Math.floor(startX / step) * step; x < endX; x += step) {
    const sampleX = x * 0.0013 * layerZ + offset;
    const h = (Math.sin(sampleX * 2.5) * 55 + Math.cos(sampleX * 6) * 25 + 110) * heightMult;
    ctx2.lineTo(x, WORLD_HEIGHT - h);
  }
  ctx2.lineTo(endX, WORLD_HEIGHT + 100);
  ctx2.closePath();
  ctx2.fill();
  if (ridgeColor) {
    ctx2.stroke();
  }
  ctx2.restore();
}

function drawRareEventFx(skin){
  const ev = RE.get();
  if(!ev) return;
  const t = tick;
  const vw = canvas.width / ZOOM_FACTOR, vh = canvas.height / ZOOM_FACTOR;
  const cx = camera.x, cy = camera.y;

  if(ev.id==='golden_tunnel'){
    ctx2.save();
    if(t%3===0){
      for(let i=0;i<3;i++){
        const px=cx+Math.random()*vw, py=cy+Math.random()*vh;
        ctx2.fillStyle=`hsl(${42+Math.random()*12},100%,${65+Math.random()*20}%)`;
        ctx2.globalAlpha=0.7;
        ctx2.beginPath();ctx2.arc(px,py,1.5+Math.random()*2,0,Math.PI*2);ctx2.fill();
      }
    }
    ctx2.restore();
  }

  if(ev.id==='crystal_cave'){
    ctx2.save();
    if(t%4===0){
      for(let i=0;i<4;i++){
        const px=cx+Math.random()*vw, py=cy+Math.random()*vh;
        ctx2.fillStyle=`hsl(${275+Math.random()*45},100%,75%)`;
        ctx2.globalAlpha=0.6;
        ctx2.beginPath();
        ctx2.moveTo(px,py-5);ctx2.lineTo(px+3,py);ctx2.lineTo(px,py+5);ctx2.lineTo(px-3,py);
        ctx2.closePath();ctx2.fill();
      }
    }
    ctx2.restore();
  }

  if(ev.id==='glitch_world'){
    ctx2.save();
    if(Math.random()<0.32) {
      ctx2.fillStyle = Math.random()>0.5 ? '#39ff14' : '#ff2a6d';
      ctx2.globalAlpha = 0.25;
      ctx2.fillRect(cx + Math.random()*vw, cy + Math.random()*vh, 15+Math.random()*50, 4+Math.random()*12);
    }
    ctx2.restore();
  }

  if(ev.id==='rainbow_mode'){
    ctx2.save();
    ctx2.globalAlpha=0.08;
    const grad=ctx2.createLinearGradient(cx,cy,cx+vw,cy+vh);
    const hue=(t*2.5)%360;
    [0,0.2,0.4,0.6,0.8,1].forEach((s,i)=>grad.addColorStop(s,`hsl(${(hue+i*60)%360},100%,50%)`));
    ctx2.fillStyle=grad;
    ctx2.fillRect(cx,cy,vw,vh);
    ctx2.restore();
  }

  if(ev.id==='shadow_mode'){
    ctx2.save();
    const grd=ctx2.createRadialGradient(player.worldX,player.y,30,player.worldX,player.y,240);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(1,'rgba(3,5,10,0.92)');
    ctx2.fillStyle=grd;
    ctx2.fillRect(cx,cy,vw,vh);
    ctx2.restore();
  }
}

/* ══════════════ GAME LOOP ══════════════ */
function updateHUD(){
  scoreEl.textContent=Math.floor(score);
  coinsEl.textContent=state.bank;
  bestEl.textContent=Math.floor(state.best);
}
function startGame(){
  Audio.ensure();Audio.UI.confirm();
  playing=true;score=0;tick=0;sessionSpikes=0;
  player.worldX=80;player.y=WORLD_HEIGHT/2;
  camera.x=0;camera.y=0;
  trail=[];particles=[];speedLines=[];shockwaves=[];floatingTexts=[];
  state.stats.attempts++;
  RE.reset();
  buildWorld();updateHUD();
  
  switchScreen(null); 
}
function die(){
  if(!playing)return;
  playing=false;
  Audio.SFX.death();
  screenShake=30;
  
  triggerFlash('rgba(255, 42, 109, 0.45)', 0.6);
  spawnShockwave(player.worldX, player.y, '#ff2a6d', 240, 8);
  
  RE.end();
  const earned=Math.floor(score/20 * RE.coinMult());
  state.bank+=earned;
  state.totalCoinsEarned=(state.totalCoinsEarned||0)+earned;
  const isNewBest=score>state.best;
  if(isNewBest)state.best=Math.floor(score);
  state.stats.bestSingleRun=Math.max(state.stats.bestSingleRun||0,Math.floor(score));
  state.stats.sessionMaxSpikes=Math.max(state.stats.sessionMaxSpikes||0,sessionSpikes);
  saveGame();updateHUD();
  checkAchievements();
  if(earned>0)setTimeout(()=>Audio.Reward.coinEarn(earned),420);
  if(isNewBest&&Math.floor(score)>0)setTimeout(()=>{Audio.Reward.highScore();showToast('★ NEW HIGH SCORE!','gold');},600);
  
  finalText.innerHTML=
    `<span style='color:#7a9ab8'>Score:</span> <b style='color:#00dfff'>${Math.floor(score)}</b>${isNewBest?"<span style='color:#efff05'> ★ NEW BEST!</span>":""}<br>`+
    `<span style='color:#7a9ab8'>Spikes Evaded:</span> ${state.stats.totalSpikesDodged}<br>`+
    `<span style='color:#7a9ab8'>Tokens Recovered:</span> <b style='color:#efff05'>+${earned}</b> (Total: ${state.bank})`;
  
  switchScreen(death);
  
  const skin=SKINS.find(s=>s.id===state.currentSkin)||SKINS[0];
  for(let i=0;i<85;i++){
    const angle=Math.random()*Math.PI*2,speed=1.5+Math.random()*11;
    particles.push({
      x:player.worldX,y:player.y,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      color:Math.random()>0.35?skin.color:skin.secondary,
      size:Math.random()*6+3,
      life:60+Math.random()*30,maxLife:90,
      type:skin.particle,
      rot:Math.random()*Math.PI,rotSpeed:(Math.random()-0.5)*0.25,
      drag:0.965,
      gravity:0.12
    });
  }
}
function update(){
  tick++;
  if(screenShake>0)screenShake*=0.88;
  if(bgPulse>0)bgPulse--;
  
  particles.forEach(p=>{
    p.vx *= (p.drag || 1);
    p.vy *= (p.drag || 1);
    p.vy += (p.gravity || 0);
    p.x+=p.vx;p.y+=p.vy;
    if(p.rot!==undefined)p.rot+=p.rotSpeed;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  stars.forEach(s=>{
    s.twinkle += s.twinkleSpeed;
  });

  if(!playing)return;
  
  RE.tick_update(score);
  score += 0.8 * RE.scoreMult();
  state.stats.totalDistance+=0.04;
  const SPEED = 8.5 * RE.speedMult();
  player.worldX+=SPEED;player.y+=holding?-SPEED:SPEED;
  
  trail.push({x:player.worldX,y:player.y,t:tick});
  if(trail.length>75)trail.shift();
  if(player.worldX>nextGenerationWorldX-1200)generateChunk();
  if(player.y<0||player.y>WORLD_HEIGHT){die();return;}
  
  const hs=4.5;
  const hp=[{x:player.worldX,y:player.y},{x:player.worldX-hs,y:player.y-hs},{x:player.worldX+hs,y:player.y-hs},
            {x:player.worldX-hs,y:player.y+hs},{x:player.worldX+hs,y:player.y+hs},{x:player.worldX+9,y:player.y}];
  
  for(const obs of worldObstacles){
    if(obs.type==='triangle'){const mx=Math.max(obs.x1,obs.x2,obs.x3);if(player.worldX<Math.min(obs.x1,obs.x2,obs.x3)-40||player.worldX>mx+40)continue;}
    else if(obs.type==='box'){if(player.worldX<obs.x-40||player.worldX>obs.x+obs.w+40)continue;}
    let hit=false;
    for(const pt of hp){
      if(obs.type==='triangle'&&pointInTriangle(pt.x,pt.y,obs.x1,obs.y1,obs.x2,obs.y2,obs.x3,obs.y3))hit=true;
      else if(obs.type==='box'&&pointInBox(pt.x,pt.y,obs.x,obs.y,obs.w,obs.h))hit=true;
      if(hit)break;
    }
    if(hit){die();return;}
    if(!obs.cleared&&(obs.x1||obs.x)<player.worldX){
      obs.cleared=true;
      if(obs.type==='triangle'){
        state.stats.totalSpikesDodged++;sessionSpikes++;
        const evBonus = RE.onSpikeDodged();
        const payout = 1 + evBonus;
        if(evBonus > 0){ state.bank += evBonus; state.totalCoinsEarned = (state.totalCoinsEarned||0) + evBonus; }
        
        const px = obs.x2;
        const py = obs.y3;
        spawnFloatingText(px, py-25, `+${payout}`, evBonus>0?'#ffd700':'#05ffa1');
        spawnShockwave(px, py, evBonus>0?'#ffd700':'#00dfff', 50);

        if(state.stats.totalSpikesDodged%100===0){Audio.SFX.rareEvent();showToast(`⚡ ${state.stats.totalSpikesDodged} SPIKES EVADED`,'cyan');}
        else if(state.stats.totalSpikesDodged%20===0)Audio.SFX.point();
      }
    }
  }

  if(Math.random() < 0.32 * RE.speedMult()) {
    speedLines.push({
      x: camera.x + (canvas.width/ZOOM_FACTOR) + 50,
      y: camera.y + Math.random()*(canvas.height/ZOOM_FACTOR),
      len: 50 + Math.random()*110 * RE.speedMult(),
      speed: 15 + Math.random()*22 * RE.speedMult(),
      opacity: 0.12 + Math.random()*0.25
    });
  }
  speedLines.forEach(sl => { sl.x -= sl.speed; });
  speedLines = speedLines.filter(sl => sl.x + sl.len > camera.x - 100);

  shockwaves.forEach(sw => {
    sw.radius += (sw.maxRadius - sw.radius) * 0.12;
    sw.life -= sw.decay;
  });
  shockwaves = shockwaves.filter(sw => sw.life > 0);

  floatingTexts.forEach(ft => {
    ft.x += ft.vx;
    ft.y += ft.vy;
    ft.life -= ft.decay;
  });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  if(worldObstacles.length>400){
    worldObstacles=worldObstacles.filter(o=>o.type==='box'?o.x+o.w>player.worldX-800:Math.max(o.x1,o.x2,o.x3)>player.worldX-800);
    structuralBlocks=structuralBlocks.filter(b=>b.x+b.w>player.worldX-800);
  }
  progressBar.style.width=Math.min(100,(score/2000)*100)+'%';
  updateHUD();
}
function getSkinColor(skin,type='primary'){
  if(skin.id==='rainbow')return`hsl(${(tick*4)%360},100%,50%)`;
  if(skin.id==='glitch'&&Math.random()>0.9)return type==='primary'?'#39ff14':'#ffffff';
  return type==='primary'?skin.color:skin.secondary;
}
function draw(){
  ctx2.fillStyle='#03060d';ctx2.fillRect(0,0,canvas.width,canvas.height);
  
  ctx2.save();
  if(screenShake>0.5) {
    ctx2.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
  }
  
  const dCamX=player.worldX-(canvas.width/(4*ZOOM_FACTOR));
  const dCamY=player.y-(canvas.height/(2*ZOOM_FACTOR));
  camera.x=dCamX;camera.y+=(dCamY-camera.y)*0.08;
  
  stars.forEach(s => {
    let sx = (s.x - camera.x * s.z) % window.innerWidth;
    if (sx < 0) sx += window.innerWidth;
    let sy = (s.y - camera.y * s.z) % WORLD_HEIGHT;
    if (sy < 0) sy += WORLD_HEIGHT;
    const alpha = (0.2 + 0.8 * Math.sin(s.twinkle)) * (1.0 - Math.min(1, Math.max(0, (sy-100)/500)));
    ctx2.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx2.beginPath();
    ctx2.arc(sx + camera.x, sy + camera.y, s.size, 0, Math.PI*2);
    ctx2.fill();
  });

  drawMountains(0.12, '#050c18', null, 1.45, 120);
  drawMountains(0.32, '#091526', 'rgba(0, 223, 255, 0.08)', 0.9, 450);

  ctx2.scale(ZOOM_FACTOR,ZOOM_FACTOR);ctx2.translate(-camera.x,-camera.y);
  
  const pl=Math.floor(bgPulse*1.2);
  ctx2.strokeStyle=`rgba(${32+pl},${58+pl},97,0.14)`;ctx2.lineWidth=1;
  const gs=45,sx=Math.floor(camera.x/gs)*gs,ex=sx+(canvas.width/ZOOM_FACTOR)+gs;
  const sy=Math.floor(camera.y/gs)*gs,ey=sy+(canvas.height/ZOOM_FACTOR)+gs;
  for(let x=sx;x<ex;x+=gs){ctx2.beginPath();ctx2.moveTo(x,sy);ctx2.lineTo(x,ey);ctx2.stroke();}
  for(let y=sy;y<ey;y+=gs){ctx2.beginPath();ctx2.moveTo(sx,y);ctx2.lineTo(ex,y);ctx2.stroke();}
  
  ctx2.fillStyle='#06101f';ctx2.strokeStyle='#162c4a';ctx2.lineWidth=2;
  for(const b of structuralBlocks){ctx2.fillRect(b.x,b.y,b.w,b.h);ctx2.strokeRect(b.x,b.y,b.w,b.h);}
  for(const obs of worldObstacles){
    if(obs.type==='triangle'){
      ctx2.fillStyle=obs.isCeiling?'#101b2a':'#0b1624';ctx2.strokeStyle='#ff2a6d';ctx2.lineWidth=1.5;
      ctx2.beginPath();ctx2.moveTo(obs.x1,obs.y1);ctx2.lineTo(obs.x2,obs.y2);ctx2.lineTo(obs.x3,obs.y3);ctx2.closePath();ctx2.fill();ctx2.stroke();
    }
  }
  
  const skin=SKINS.find(s=>s.id===state.currentSkin)||SKINS[0];
  drawRareEventFx(skin);

  if(trail.length>1){
    ctx2.save();
    ctx2.globalCompositeOperation = 'lighter';
    ctx2.shadowBlur=skin.glow;
    ctx2.shadowColor=getSkinColor(skin);
    
    ctx2.lineWidth=skin.trail==='thick'?10:6;
    ctx2.strokeStyle=getSkinColor(skin);
    ctx2.globalAlpha = 0.45;
    ctx2.beginPath();
    ctx2.moveTo(trail[0].x, trail[0].y);
    for(let i=1;i<trail.length;i++) ctx2.lineTo(trail[i].x, trail[i].y);
    ctx2.stroke();

    ctx2.lineWidth=2.5;
    ctx2.strokeStyle='#ffffff';
    ctx2.globalAlpha = 0.95;
    ctx2.beginPath();
    ctx2.moveTo(trail[0].x, trail[0].y);
    for(let i=1;i<trail.length;i++) ctx2.lineTo(trail[i].x, trail[i].y);
    ctx2.stroke();
    
    ctx2.restore();
  }

  ctx2.save();
  ctx2.lineWidth = 1.2;
  speedLines.forEach(sl => {
    ctx2.strokeStyle = `rgba(255, 255, 255, ${sl.opacity})`;
    ctx2.beginPath();
    ctx2.moveTo(sl.x, sl.y);
    ctx2.lineTo(sl.x - sl.len, sl.y);
    ctx2.stroke();
  });
  ctx2.restore();

  ctx2.save();
  ctx2.globalCompositeOperation = 'lighter';
  shockwaves.forEach(sw => {
    ctx2.strokeStyle = sw.color;
    ctx2.lineWidth = sw.thickness;
    ctx2.globalAlpha = sw.life;
    ctx2.beginPath();
    ctx2.arc(sw.x, sw.y, sw.radius, 0, Math.PI*2);
    ctx2.stroke();
  });
  ctx2.restore();

  particles.forEach(p=>{
    ctx2.save();ctx2.translate(p.x,p.y);if(p.rot)ctx2.rotate(p.rot);
    ctx2.fillStyle=skin.id==='rainbow'?`hsl(${(p.life*8)%360},100%,50%)`:p.color;
    ctx2.globalAlpha=p.life/p.maxLife;
    if(p.type==='circle'){ctx2.beginPath();ctx2.arc(0,0,p.size/2,0,Math.PI*2);ctx2.fill();}
    else if(p.type==='diamond'){ctx2.beginPath();ctx2.moveTo(0,-p.size);ctx2.lineTo(p.size,0);ctx2.lineTo(0,p.size);ctx2.lineTo(-p.size,0);ctx2.closePath();ctx2.fill();}
    else if(p.type==='star'){ctx2.beginPath();for(let k=0;k<5;k++){ctx2.lineTo(Math.cos((18+k*72)*Math.PI/180)*p.size,-Math.sin((18+k*72)*Math.PI/180)*p.size);ctx2.lineTo(Math.cos((54+k*72)*Math.PI/180)*p.size*0.4,-Math.sin((54+k*72)*Math.PI/180)*p.size*0.4);}ctx2.closePath();ctx2.fill();}
    else{ctx2.fillRect(-p.size/2,-p.size/2,p.size,p.size);}
    ctx2.restore();
  });

  if(playing){
    ctx2.save();ctx2.translate(player.worldX,player.y);ctx2.rotate(holding?-Math.PI/4:Math.PI/4);
    if(skin.id==='glitch'&&Math.random()>0.8)ctx2.translate((Math.random()-0.5)*4,(Math.random()-0.5)*4);
    ctx2.shadowBlur=skin.glow;ctx2.shadowColor=getSkinColor(skin,'primary');
    
    ctx2.fillStyle=getSkinColor(skin,'primary');
    ctx2.beginPath();ctx2.moveTo(12,0);ctx2.lineTo(-10,-9);ctx2.lineTo(-5,0);ctx2.lineTo(-10,9);ctx2.closePath();ctx2.fill();
    ctx2.fillStyle=getSkinColor(skin,'secondary');
    ctx2.beginPath();ctx2.moveTo(3,0);ctx2.lineTo(-5,-5);ctx2.lineTo(-2,0);ctx2.lineTo(-5,5);ctx2.closePath();ctx2.fill();
    ctx2.restore();
  }

  ctx2.save();
  floatingTexts.forEach(ft => {
    ctx2.fillStyle = ft.color;
    ctx2.font = `bold ${ft.size}px 'Segoe UI',Arial,sans-serif`;
    ctx2.globalAlpha = ft.life;
    ctx2.fillText(ft.text, ft.x, ft.y);
  });
  ctx2.restore();

  ctx2.restore();

  if (flashIntensity > 0.01) {
    ctx2.save();
    ctx2.fillStyle = flashColor;
    ctx2.globalAlpha = flashIntensity;
    ctx2.fillRect(0, 0, canvas.width, canvas.height);
    ctx2.restore();
    flashIntensity *= 0.88; 
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}

/* ══════════════ DAILY REWARD UI ══════════════ */
let countdownInterval = null;

function formatCountdown(ms){
  if(ms<=0) return '00:00:00';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return [h,m,s].map(v=>String(v).padStart(2,'0')).join(':');
}

function spawnCoinParticles(amount){
  const overlay = document.getElementById('claimOverlay');
  overlay.innerHTML = '';
  overlay.classList.remove('hidden');
  const burst = document.createElement('div');
  burst.className = 'claim-burst';
  burst.textContent = amount >= 1000 ? '👑' : amount >= 500 ? '💎' : '🪙';
  overlay.appendChild(burst);
  const count = Math.min(24, 8 + Math.floor(amount / 50));
  for(let i=0;i<count;i++){
    const coin = document.createElement('div');
    coin.className = 'coin-particle';
    const angle = (Math.random() * 2 - 1) * Math.PI;
    const dist = 80 + Math.random() * 200;
    const tx = Math.round(Math.cos(angle) * dist);
    const ty = Math.round(-50 - Math.random() * 220);
    const rot = (Math.random() * 720 - 360) + 'deg';
    const dur = (0.6 + Math.random() * 0.5).toFixed(2) + 's';
    coin.style.setProperty('--tx', tx+'px');
    coin.style.setProperty('--ty', ty+'px');
    coin.style.setProperty('--rot', rot);
    coin.style.setProperty('--dur', dur);
    coin.style.animationDelay = (Math.random()*0.15).toFixed(2)+'s';
    coin.textContent = ['🪙','⭐','✨','💫'][Math.floor(Math.random()*4)];
    overlay.appendChild(coin);
  }
  setTimeout(()=>{
    overlay.classList.add('hidden');
    overlay.innerHTML='';
  }, 1200);
}

    if(dr.milestone) card.classList.add('milestone');

    row.appendChild(card);
  });
  const rewardDiv = document.getElementById('rewardDisplay');

    }
  } else {
    rewardDiv.style.display = 'none';
  }
  const cdWrap = document.getElementById('countdownWrap');
  const cdVal = document.getElementById('countdownVal');
  if(!canClaim && msUntilNext > 0){
    cdWrap.style.display = 'block';
    cdVal.textContent = formatCountdown(msUntilNext);
    if(countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(()=>{
      const ms2 = DailyReward.getStatus().msUntilNext;
      if(ms2 <= 0){
        clearInterval(countdownInterval);
        renderDailyModal();
      } else {
        cdVal.textContent = formatCountdown(ms2);
      }
    }, 1000);
  } else {
    cdWrap.style.display = 'none';
    if(countdownInterval) clearInterval(countdownInterval);
  }
  const claimBtn = document.getElementById('claimBtn');
  claimBtn.disabled = !canClaim;
  claimBtn.textContent = canClaim
    ? (streakBroken && d.streak > 0 ? '⚡ RESTART STREAK' : '★ CLAIM REWARD')
    : 'ALREADY CLAIMED TODAY';
}

function openDailyModal(){
  Audio.ensure();
  Audio.UI.shopOpen();
  switchScreen(null);
  document.getElementById('dailyModal').classList.remove('hidden');
  renderDailyModal();
}

function closeDailyModal(){
  Audio.UI.back();
  document.getElementById('dailyModal').classList.add('hidden');
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
  switchScreen(menu);
  updateDailyBadge();
}

function doClaimReward(){
  Audio.ensure();
  const result = DailyReward.claim();
  if(!result) return;
  const {totalCoins, milestone, milestoneBonus, streak} = result;
  const totalAwarded = totalCoins + milestoneBonus;
  state.bank += totalAwarded;
  state.totalCoinsEarned = (state.totalCoinsEarned||0) + totalAwarded;
  state.stats.dailyClaimed = (state.stats.dailyClaimed||0) + 1;
  saveGame(); updateHUD();
  Audio.Reward.dailyReward(!!milestone || result.reward.milestone);
  spawnCoinParticles(totalCoins);
  showToast(`★ DAY ${streak} REWARD: +${totalCoins.toLocaleString()} COINS`, 'gold');
  if(milestone){
    setTimeout(()=>{
      showMilestonePopup(milestone);
      showToast(`🏆 MILESTONE: ${milestone.name} +${milestone.bonus.toLocaleString()}`, 'purple');
    }, 600);
  }
  checkAchievements();
  setTimeout(()=>renderDailyModal(), 200);
  updateDailyBadge();
}

function updateDailyBadge(){
  const {canClaim} = DailyReward.getStatus();
  const menuBtn = document.getElementById('menuDailyBtn');
  let badge = menuBtn.querySelector('.daily-badge');
  if(canClaim){
    menuBtn.style.borderColor = '#ffd700';
    menuBtn.style.boxShadow = '0 0 18px rgba(255,215,0,0.45)';
    if(!badge){
      badge = document.createElement('span');
      badge.className = 'daily-badge';
      badge.textContent = 'NEW';
      menuBtn.appendChild(badge);
    }
  } else {
    menuBtn.style.borderColor = '#162a4a';
    menuBtn.style.boxShadow = 'none';
    if(badge) badge.remove();
  }
  const panelBtn = document.getElementById('dailyBadgeBtn');
  panelBtn.style.display = canClaim ? 'block' : 'none';
}

/* ══════════════ SHOP ══════════════ */
function openShop(){
  Audio.UI.shopOpen();
  switchScreen(shopScreen);renderShop();
}
function renderShop(){
  const sg=document.getElementById('shopGrid');sg.innerHTML='';
  SKINS.forEach(skin=>{
    const owned=state.unlockedSkins.includes(skin.id),equipped=state.currentSkin===skin.id;
    const card=document.createElement('div');
    card.className=`shop-item ${equipped?'equipped':''}`;card.style.borderColor=skin.rarity.color;
    let act=`BUY: ${skin.cost} 🪙`;if(equipped)act='EQUIPPED';else if(owned)act='EQUIP';
    card.innerHTML=`<div class="rarity-badge" style="color:${skin.rarity.color};border-color:${skin.rarity.color}">${skin.rarity.name}</div>
      <div style="font-weight:bold;margin-top:10px;font-size:15px">${skin.name}</div>
      <div class="skin-preview" style="background:linear-gradient(135deg,${skin.color} 50%,${skin.secondary} 50%);box-shadow:0 0 ${skin.glow}px ${skin.color}"></div>
      <button style="padding:6px 10px;font-size:12px;margin:0" ${equipped?'disabled':''}>${act}</button>`;
    card.querySelector('button').addEventListener('click',e=>{
      e.stopPropagation();
      if(owned){
        state.currentSkin=skin.id;Audio.Reward.equip();showToast(`EQUIPPED: ${skin.name}`,'cyan');
      }else{
        if(state.bank>=skin.cost){
          state.bank-=skin.cost;state.stats.totalSpent=(state.stats.totalSpent||0)+skin.cost;
          state.unlockedSkins.push(skin.id);state.currentSkin=skin.id;
          Audio.Reward.purchase();showToast(`PURCHASED: ${skin.name}`,'gold');
          checkAchievements();
        }else{Audio.UI.back();showToast(`NEED ${skin.cost-state.bank} MORE COINS`,'pink');return;}
      }
      saveGame();renderShop();updateHUD();
    });
    sg.appendChild(card);
  });
}

/* ══════════════ ACHIEVEMENTS SCREEN ══════════════ */
function openAch(){
  Audio.UI.tab();
  switchScreen(achScreen);renderAch();
}
function renderAch(){
  const content=document.getElementById('achContent');
  const total=ACHIEVEMENTS.length,unlocked=state.unlockedAchs.length;
  const pct=Math.round((unlocked/total)*100);
  const cats={};
  ACHIEVEMENTS.forEach(a=>{if(!cats[a.cat])cats[a.cat]=[];cats[a.cat].push(a);});
  let html=`<div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#7a9ab8;margin-bottom:6px">
      <span>Completion</span><span style="color:#00dfff;font-weight:bold">${unlocked} / ${total} &nbsp; ${pct}%</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div style="font-size:11px;color:#7a9ab8">Bonus coins earned from achievements: <b style="color:#ffd700">${calcAchBonus()}</b></div>
  </div>`;
  const catOrder=Object.values(ACH_CATS);
  catOrder.forEach(cat=>{
    if(!cats[cat])return;
    html+=`<div style="font-size:11px;letter-spacing:2px;color:#00dfff;font-weight:bold;text-transform:uppercase;margin:14px 0 8px;border-bottom:1px solid #162a4a;padding-bottom:4px">${cat}</div>`;
    html+=`<div class="ach-grid">`;
    cats[cat].forEach(a=>{
      const done=state.unlockedAchs.includes(a.id);
      const tierColor=a.tier==='legendary'?'#ff2a6d':a.tier==='epic'?'#bc34fa':'#ffd700';
      html+=`<div class="ach-card ${done?'unlocked':'locked'}" style="border-color:${done?tierColor:'#162a4a'}">
        <div class="ach-cat" style="color:${tierColor}">${a.tier.toUpperCase()}</div>
        <div style="font-size:22px;margin:2px 0">${a.icon}</div>
        <div class="ach-card-name">${a.name}</div>
        <div class="ach-card-desc">${a.desc}</div>
        <div class="ach-card-bonus">+${a.bonus} coins</div>
        <div class="ach-check">${done?'✔️':'🔒'}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  content.innerHTML=html;
}
function calcAchBonus(){
  return ACHIEVEMENTS.filter(a=>state.unlockedAchs.includes(a.id)).reduce((s,a)=>s+a.bonus,0);
}

/* ══════════════ STATS SCREEN ══════════════ */
function openStats(){
  Audio.UI.tab();switchScreen(statsScreen);
  const dd = DailyReward.getData();
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-row">Total Attempts <span class="stat-val">${state.stats.attempts}</span></div>
    <div class="stat-row">Direction Swaps <span class="stat-val">${state.stats.totalClicks}</span></div>
    <div class="stat-row">Lifetime Distance <span class="stat-val">${Math.floor(state.stats.totalDistance)}u</span></div>
    <div class="stat-row">Spikes Cleared <span class="stat-val">${state.stats.totalSpikesDodged}</span></div>
    <div class="stat-row">Coins Earned (Total) <span class="stat-val" style="color:#ffd700">${state.totalCoinsEarned||0}</span></div>
    <div class="stat-row">Coins Spent <span class="stat-val">${state.stats.totalSpent||0}</span></div>
    <div class="stat-row">Skins Owned <span class="stat-val">${state.unlockedSkins.length} / ${SKINS.length}</span></div>
    <div class="stat-row">Best Single Run <span class="stat-val" style="color:#05ffa1">${Math.floor(state.best)}</span></div>
    <div class="stat-row">Achievements Unlocked <span class="stat-val" style="color:#bc34fa">${state.unlockedAchs.length} / ${ACHIEVEMENTS.length}</span></div>
    <hr style="border-color:#162a4a;margin:14px 0">
    <div style="font-size:11px;letter-spacing:2px;color:#ffd700;font-weight:bold;margin-bottom:8px">DAILY LOGIN</div>
    <div class="stat-row">Current Streak <span class="stat-val" style="color:#ffd700">${dd.streak || 0} days 🔥</span></div>
    <div class="stat-row">Best Streak <span class="stat-val" style="color:#ffd700">${dd.bestStreak || 0} days</span></div>
    <div class="stat-row">Total Days Claimed <span class="stat-val">${dd.totalClaimed || 0}</span></div>
    <div class="stat-row">Milestones Hit <span class="stat-val" style="color:#bc34fa">${(dd.milestonesClaimed||[]).length}</span></div>
    <div class="stat-row">Last Claimed <span class="stat-val">${dd.lastClaimTimestamp ? new Date(dd.lastClaimTimestamp).toLocaleDateString() : 'Never'}</span></div>
  `;
}

/* ══════════════ BUTTON BINDINGS ══════════════ */
document.getElementById('playBtn').addEventListener('click',()=>{Audio.ensure();startGame();});
document.getElementById('retryBtn').addEventListener('click',()=>{Audio.UI.confirm();startGame();});
document.getElementById('shopBtn').addEventListener('click',openShop);
document.getElementById('achBtn').addEventListener('click',openAch);
document.getElementById('statsBtn').addEventListener('click',openStats);
document.getElementById('menuDailyBtn').addEventListener('click',()=>{Audio.ensure();openDailyModal();});
document.getElementById('shopBackBtn').addEventListener('click',()=>{Audio.UI.back();switchScreen(menu);});
document.getElementById('statsBackBtn').addEventListener('click',()=>{Audio.UI.back();switchScreen(menu);});
document.getElementById('achBackBtn').addEventListener('click',()=>{Audio.UI.back();switchScreen(menu);});
document.getElementById('deathMenuBtn').addEventListener('click',()=>{Audio.UI.nav();switchScreen(menu);updateDailyBadge();});

document.getElementById('dailyCloseBtn').addEventListener('click',closeDailyModal);

/* ══════════════ AUDIO PANEL ══════════════ */
(function(){
  const panel=document.getElementById('audioPanel'),muteBtn=document.getElementById('muteBtn');
  const collapseBtn=document.getElementById('collapseBtn'),dailyBtn=document.getElementById('dailyBadgeBtn');
  const sliders={
    master:{el:document.getElementById('volMaster'),out:document.getElementById('volMasterVal'),cat:'master'},
    sfx:{el:document.getElementById('volSfx'),out:document.getElementById('volSfxVal'),cat:'sfx'},
    ui:{el:document.getElementById('volUi'),out:document.getElementById('volUiVal'),cat:'ui'},
    reward:{el:document.getElementById('volReward'),out:document.getElementById('volRewardVal'),cat:'reward'}
  };
  const s=Audio.getSettings();
  Object.keys(sliders).forEach(k=>{const item=sliders[k];const pct=Math.round((s[k]||0.8)*100);item.el.value=pct;item.out.textContent=pct;});
  Object.values(sliders).forEach(({el,out,cat})=>{el.addEventListener('input',()=>{out.textContent=el.value;Audio.setVolume(cat,parseInt(el.value));});el.addEventListener('change',()=>Audio.UI.tab());});
  muteBtn.addEventListener('click',()=>{Audio.ensure();const now=Audio.toggleMute();muteBtn.textContent=now?'UNMUTE':'MUTE';muteBtn.classList.toggle('muted',now);if(!now)Audio.UI.confirm();});
  if(Audio.isMuted()){muteBtn.textContent='UNMUTE';muteBtn.classList.add('muted');}
  let collapsed=false;
  collapseBtn.addEventListener('click',()=>{collapsed=!collapsed;panel.classList.toggle('collapsed',collapsed);collapseBtn.textContent=collapsed?'▲':'▼';Audio.UI.tab();});
  dailyBtn.addEventListener('click',()=>{Audio.ensure();openDailyModal();});
})();

updateHUD();
updateDailyBadge();
loop();
</script>
